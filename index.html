<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Encuesta Infantil</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffe6f2, #dff6ff);
    color: #333;
  }

  .container {
    max-width: 720px;
    margin: 30px auto;
    background: white;
    border-radius: 28px;
    padding: 28px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    border: 6px solid #ffd166;
  }

  h1 {
    text-align: center;
    color: #ef476f;
    margin-bottom: 5px;
    font-size: 32px;
  }

  .subtitulo {
    text-align: center;
    color: #118ab2;
    margin-bottom: 25px;
    font-size: 18px;
  }

  .decoracion {
    text-align: center;
    font-size: 36px;
    margin-bottom: 10px;
  }

  .campo {
    margin-bottom: 22px;
  }

  label.titulo {
    display: block;
    font-weight: bold;
    margin-bottom: 10px;
    color: #073b4c;
    font-size: 18px;
  }

  input[type="text"] {
    width: 100%;
    box-sizing: border-box;
    padding: 14px;
    border-radius: 16px;
    border: 2px solid #a8dadc;
    font-size: 16px;
  }

  .pregunta {
    background: #f8fbff;
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 18px;
    border: 2px dashed #8ecae6;
  }

  .pregunta p {
    font-weight: bold;
    margin-top: 0;
    color: #073b4c;
    font-size: 18px;
  }

  .opcion {
    display: block;
    background: #ffffff;
    margin: 10px 0;
    padding: 14px;
    border-radius: 16px;
    border: 2px solid #eee;
    cursor: pointer;
    transition: 0.2s;
  }

  .opcion:hover {
    background: #fff3c4;
    border-color: #ffd166;
    transform: scale(1.01);
  }

  input[type="radio"] {
    transform: scale(1.2);
    margin-right: 8px;
  }

  button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 22px;
    background: #06d6a0;
    color: white;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 6px 0 #049b75;
  }

  button:disabled {
    background: #aaa;
    box-shadow: none;
    cursor: not-allowed;
  }

  #procesando {
    display: none;
    text-align: center;
    font-size: 20px;
    color: #118ab2;
    font-weight: bold;
    margin-top: 20px;
  }

  .spinner {
    margin: 15px auto;
    width: 45px;
    height: 45px;
    border: 6px solid #ffd166;
    border-top: 6px solid #ef476f;
    border-radius: 50%;
    animation: girar 1s linear infinite;
  }

  @keyframes girar {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  #resultado {
    display: none;
    text-align: center;
    padding: 25px;
    background: #fff3c4;
    border-radius: 24px;
    border: 4px solid #ffd166;
    margin-top: 25px;
  }

  #resultado h2 {
    color: #ef476f;
    font-size: 30px;
  }

  .detalle {
    color: #073b4c;
    font-size: 18px;
  }
</style>
</head>

<body>

<div class="container">
  <div class="decoracion">🌈 ⭐ 🧸 🎈</div>

  <h1>Encuesta Mágica</h1>
  <div class="subtitulo">Respondé las preguntas y descubrí tu resultado</div>

  <form id="form">
    <div class="campo">
      <label class="titulo">Nombre</label>
      <input type="text" name="nombre" placeholder="Escribí tu nombre" required>
    </div>

    <div class="pregunta">
      <p>1. ¿Qué plan te gusta más?</p>
      <label class="opcion"><input type="radio" name="p1" value="A" required> Dibujar y crear cosas</label>
      <label class="opcion"><input type="radio" name="p1" value="B"> Correr y jugar afuera</label>
    </div>

    <div class="pregunta">
      <p>2. ¿Qué elegirías?</p>
      <label class="opcion"><input type="radio" name="p2" value="A" required> Un cuento lleno de aventuras</label>
      <label class="opcion"><input type="radio" name="p2" value="B"> Un juego con muchos desafíos</label>
    </div>

    <div class="pregunta">
      <p>3. ¿Qué color te representa más?</p>
      <label class="opcion"><input type="radio" name="p3" value="A" required> Rosa / violeta / celeste</label>
      <label class="opcion"><input type="radio" name="p3" value="B"> Verde / rojo / amarillo</label>
    </div>

    <button id="btnEnviar" type="submit">Ver mi resultado</button>
  </form>

  <div id="procesando">
    <div class="spinner"></div>
    Procesando tus respuestas...
  </div>

  <div id="resultado"></div>
</div>

<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyhO9Jk6T7eLt2brlT32Z7xva3o70am4hS7veiUq_H6Zbe-2x8nOqL6gn75spfCPfyWXg/exec";

document.getElementById("form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const form = this;
  const btn = document.getElementById("btnEnviar");
  const procesando = document.getElementById("procesando");
  const resultadoDiv = document.getElementById("resultado");

  btn.disabled = true;
  btn.innerText = "Enviando...";
  procesando.style.display = "block";

  const formData = new FormData(form);
  const data = Object.fromEntries(formData.entries());

  let a = 0;
  let b = 0;

  Object.values(data).forEach(valor => {
    if (valor === "A") a++;
    if (valor === "B") b++;
  });

  data.totalA = a;
  data.totalB = b;
  data.resultado = a > b ? "Perfil Creativo" : b > a ? "Perfil Aventurero" : "Perfil Equilibrado";
  data.fecha = new Date().toLocaleString();

  try {
    await fetch(URL_SCRIPT, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data)
    });

    form.style.display = "none";
    procesando.style.display = "none";

    resultadoDiv.style.display = "block";
    resultadoDiv.innerHTML = `
      <h2>🎉 ${data.resultado}</h2>
      <p class="detalle">A: ${a} respuestas</p>
      <p class="detalle">B: ${b} respuestas</p>
      <p>¡Gracias por participar!</p>
    `;

  } catch (error) {
    procesando.innerHTML = "Hubo un error al enviar. Intentá nuevamente.";
    btn.disabled = false;
    btn.innerText = "Ver mi resultado";
  }
});
</script>

</body>
</html>
