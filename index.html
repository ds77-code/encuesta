<form id="form">
  <input name="nombre" placeholder="Nombre" required>

  <p>1. Pregunta</p>
  <label><input type="radio" name="p1" value="A" required> A</label>
  <label><input type="radio" name="p1" value="B"> B</label>

  <p>2. Pregunta</p>
  <label><input type="radio" name="p2" value="A" required> A</label>
  <label><input type="radio" name="p2" value="B"> B</label>

  <button type="submit">Enviar</button>
</form>

<div id="resultado"></div>

<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyhO9Jk6T7eLt2brlT32Z7xva3o70am4hS7veiUq_H6Zbe-2x8nOqL6gn75spfCPfyWXg/exec";

document.getElementById("form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(this);
  const data = Object.fromEntries(formData.entries());

  let a = 0;
  let b = 0;

  Object.values(data).forEach(v => {
    if (v === "A") a++;
    if (v === "B") b++;
  });

  data.totalA = a;
  data.totalB = b;
  data.resultado = a > b ? "Resultado A" : b > a ? "Resultado B" : "Empate";
  data.fecha = new Date().toLocaleString();

  await fetch(URL_SCRIPT, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  });

  document.getElementById("resultado").innerHTML =
    `<h2>${data.resultado}</h2>
     <p>A: ${a} / B: ${b}</p>`;

  this.style.display = "none";
});
</script>
